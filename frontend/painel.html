<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymFlow - Botoeira Virtual</title>
  <link rel="stylesheet" href="/src/styles/global.css">
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

  <div class="bg-gray-800 p-6 rounded-2xl shadow-lg w-full max-w-md text-center border border-gray-700">
    <h1 class="text-2xl font-bold mb-2 text-indigo-400">GymFlow</h1>
    <p class="text-gray-400 mb-6 text-sm">Painel de Controle Manual do Personal</p>

    <div class="mb-6 bg-gray-900 p-4 rounded-xl border border-gray-700">
      <p class="text-xs uppercase tracking-wider text-gray-500">Alunos no Momento</p>
      <span id="contador" class="text-5xl font-black text-green-400">0</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <button id="btn-out" class="bg-red-600 hover:bg-red-700 active:scale-95 transition text-white font-bold py-6 px-4 rounded-xl text-xl shadow-md">
        ➖ SAÍDA (-1)
      </button>
      <button id="btn-in" class="bg-green-600 hover:bg-green-700 active:scale-95 transition text-white font-bold py-6 px-4 rounded-xl text-xl shadow-md">
        ➕ ENTRADA (+1)
      </button>
    </div>

    <div class="flex gap-2 border-t border-gray-700 pt-4">
      <input type="number" id="inputValor" placeholder="Ex: 10" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-center text-lg">
      <button id="btn-set" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap">
        Definir Fila
      </button>
    </div>

    <!-- Feedback visual amigável que substitui o alert() -->
    <div id="statusMsg" class="hidden mt-4 p-2 rounded text-xs bg-indigo-900/50 text-indigo-300 border border-indigo-700/50 transition-all"></div>
  </div>

  <script type="module" src="/src/painel.js"></script>
</body>
</html>
